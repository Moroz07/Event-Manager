# This workflow will build a .NET project
# For more information see: https://github.com/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore EventManager/EventManager/EventManager.csproj
    - name: Build
      run: dotnet build EventManager/EventManager/EventManager.csproj --no-restore
    - name: Test
      run: dotnet test EventManager/EventManager.Test/EventManager.Test.csproj --no-build --verbosity normal
